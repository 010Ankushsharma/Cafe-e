services:
  - type: web
    name: cafe-order-manager
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn 'wsgi:application'
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString

databases:
  - name: cafe-db
    databaseName: cafe_db
    user: cafe_user
